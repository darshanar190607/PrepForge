services:
  - type: web
    name: prepforge
    runtime: node
    region: singapore  # change to your preferred region (oregon, frankfurt, ohio, etc.)
    plan: free          # change to 'starter' or higher for production use

    buildCommand: npm install && npm run build:all
    startCommand: npm run start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false       # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false       # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false       # set manually in Render dashboard
      - key: PORT
        value: 10000      # Render's default internal port
